# =============================================================================
# SQ-MIL — Stage 1 Training Configuration
# Encoder: Conch (pathology foundation model, 512-dim)
# Task: Ovarian cancer 5-subtype classification (UBC-OCEAN)
# =============================================================================

# ------------------------------------------------------------------
# Experiment identity
# ------------------------------------------------------------------
experiment:
  name: ovarian_conch_s1
  description: "SMMILe Stage 1 — Conch encoder, ovarian 5-subtype"
  seed: 42

# ------------------------------------------------------------------
# Paths  (override via CLI: --data_root /path/to/data)
# ------------------------------------------------------------------
paths:
  data_root: data                      # Root of all data (relative to repo root)
  embedding_dir: data/embeddings       # Pre-extracted .npy patch embeddings
  superpixel_dir: data/superpixels     # SLIC superpixel maps (.npy)
  split_dir: data/splits               # Fold CSV files
  labels_csv: data/labels.csv          # slide_id, label
  output_dir: results/stage1           # Checkpoints + logs

# ------------------------------------------------------------------
# Dataset / cross-validation
# ------------------------------------------------------------------
dataset:
  n_folds: 5
  fold: 0                              # Override with --fold N
  # train:val ratio within the 80% non-test set
  val_ratio: 0.10                      # 10% of train+val → val

# ------------------------------------------------------------------
# Model architecture
# ------------------------------------------------------------------
model:
  encoder: conch                       # "conch" | "resnet50"
  embedding_dim: 512                   # Conch output dim (ResNet-50: 1024)
  n_classes: 5                         # CC, EC, HGSC, LGSC, MC
  # NIC convolutional layer
  nic:
    kernel_size: 3                     # 3×3 (use 1 only for Camelyon16)
    out_channels: 256
  # Gated attention
  attention:
    hidden_dim: 256
    dropout: true
    dropout_rate: 0.25
  # Instance Dropout (InD)
  instance_dropout:
    enabled: true
    drop_rate: 0.5                     # Fraction of top-scoring instances dropped
  # Delocalized Instance Sampling (InS)
  instance_sampling:
    enabled: true
    n_pseudobags: 5

# ------------------------------------------------------------------
# Training — Stage 1
# ------------------------------------------------------------------
training:
  stage: 1
  epochs: 40                           # 40 for Conch; use 200 for ResNet-50
  batch_size: 1                        # MIL: one bag (WSI) per step
  optimizer:
    name: adam
    lr: 2.0e-5
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
  scheduler:
    name: cosine                       # "cosine" | "step" | "none"
    min_lr: 1.0e-7
  # Early stopping
  early_stopping:
    enabled: true
    patience: 10                       # Epochs without val-loss improvement
    monitor: val_loss
  # Class imbalance
  weighted_sampling: true

# ------------------------------------------------------------------
# Loss functions (Stage 1)
# ------------------------------------------------------------------
loss:
  cls_weight: 1.0                      # Weight for L_cls (BCE per category)
  # L_cons not used for UBC-OCEAN (no explicit normal class)
  consistency: false

# ------------------------------------------------------------------
# Logging & checkpointing
# ------------------------------------------------------------------
logging:
  log_every_n_steps: 10
  save_top_k: 1                        # Keep only the best checkpoint
  save_last: true
  tensorboard: true

# ------------------------------------------------------------------
# Hardware
# ------------------------------------------------------------------
hardware:
  num_workers: 4
  pin_memory: true
  # Set gpu_id: -1 for CPU (not recommended for full training)
  gpu_id: 0
